name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  storefront:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
        env:
          # Production-mode build validates env: https site, Paymob all-or-nothing, Supabase pair-or-neither
          NEXT_PUBLIC_SITE_URL: https://ci.example.com
          NEXT_TELEMETRY_DISABLED: "1"
